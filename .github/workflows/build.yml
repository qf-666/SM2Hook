name: Build SM2Hook Tweak

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: itsnebulalol/theos-action@v1.0.0
        with:
          theos-sdks: https://github.com/theos/sdks
          theos-sdks-branch: master

      - name: Pin official Theos SDKs
        run: |
          rm -rf "$THEOS/sdks"
          git clone --depth 1 https://github.com/theos/sdks "$THEOS/sdks"
          ls -1 "$THEOS/sdks"

      - name: Build package
        run: make package FINALPACKAGE=1

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: SM2Hook-deb
          path: packages/*.deb

      - name: Publish GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: SM2Hook ${{ github.ref_name }}
          files: packages/*.deb
          fail_on_unmatched_files: true
          generate_release_notes: true
